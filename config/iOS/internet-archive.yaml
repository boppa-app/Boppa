highlightColor: "#FFFFFF"
data:
  search:
    albums: |
      const query = params.query;
      const page = params.previousResult?.page ? params.previousResult.page + 1 : 1;
      const pageSize = 15;

      const url = 'https://archive.org/advancedsearch.php?q=' + encodeURIComponent('mediatype:audio AND (creator:(' + query + ') OR title:(' + query + '))')
        + '&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=date&fl[]=downloads&fl[]=format'
        + '&sort[]=downloads+desc'
        + '&rows=' + pageSize
        + '&page=' + page
        + '&output=json';

      const resp = await fetch(url);
      const data = await resp.json();
      const docs = data.response?.docs || [];

      // Archive.org auto-derives a waveform PNG + spectrogram + item-tile thumb for every
      // audio upload, real uploaded cover art is tagged 'JPEG' or 'Item Image' in this list.
      // Without this check, items with no real art would show the waveform as artwork.
      function hasRealArtwork(format) {
        const formats = Array.isArray(format) ? format : (format ? [format] : []);
        return formats.includes('JPEG') || formats.includes('Item Image');
      }

      const items = docs.map(d => ({
        id: d.identifier,
        title: d.title || d.identifier,
        subtitle: d.creator || 'Unknown Artist',
        year: d.date ? parseInt(d.date.substring(0, 4), 10) || null : null,
        lowResArtworkUrl: hasRealArtwork(d.format) ? 'https://archive.org/services/img/' + d.identifier : undefined
      }));

      const result = { items: items };
      if (docs.length === pageSize) {
        result.page = page;
      }
      postResult(result);
    artists: |
      const query = params.query;
      const page = params.previousResult?.page ? params.previousResult.page + 1 : 1;

      const url = 'https://archive.org/advancedsearch.php?q=' + encodeURIComponent('mediatype:audio AND creator:(' + query + ')')
        + '&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=downloads&fl[]=format'
        + '&sort[]=downloads+desc'
        + '&rows=50'
        + '&page=' + page
        + '&output=json';

      const resp = await fetch(url);
      const data = await resp.json();
      const docs = data.response?.docs || [];

      // Archive.org auto-derives a waveform PNG + spectrogram + item-tile thumb for every
      // audio upload, real uploaded cover art is tagged 'JPEG' or 'Item Image' in this list.
      // Without this check, items with no real art would show the waveform as artwork.
      function hasRealArtwork(format) {
        const formats = Array.isArray(format) ? format : (format ? [format] : []);
        return formats.includes('JPEG') || formats.includes('Item Image');
      }

      const seen = new Set();
      const items = [];
      for (const d of docs) {
        const name = d.creator;
        if (!name || seen.has(name)) continue;
        seen.add(name);
        items.push({
          id: name,
          name: name,
          lowResArtworkUrl: hasRealArtwork(d.format) ? 'https://archive.org/services/img/' + d.identifier : undefined
        });
      }

      const result = { items: items };
      if (docs.length === 50) {
        result.page = page;
      }
      postResult(result);
  list:
    album: |
      const identifier = params.id;

      const url = 'https://archive.org/metadata/' + encodeURIComponent(identifier) + '/files';
      const resp = await fetch(url);
      const data = await resp.json();
      const files = data.result || [];

      const metaResp = await fetch('https://archive.org/metadata/' + encodeURIComponent(identifier) + '/metadata');
      const meta = await metaResp.json();
      const itemMeta = meta.result || {};
      const albumArtist = itemMeta.creator || 'Unknown Artist';
      const albumTitle = itemMeta.title || identifier;

      function findRealArtworkFile(fileList) {
        const candidates = (fileList || []).filter(f => {
          const name = (f.name || '').toLowerCase();
          if (!/\.(jpe?g|png|gif)$/.test(name)) return false;
          if (name === '__ia_thumb.jpg') return false;
          return f.source === 'original';
        });
        if (candidates.length === 0) return null;
        candidates.sort((a, b) => (parseInt(b.size, 10) || 0) - (parseInt(a.size, 10) || 0));
        return candidates[0].name;
      }

      let lowResArtworkUrl;
      let highResArtworkUrl;
      const realArtworkFileName = findRealArtworkFile(files);
      if (realArtworkFileName) {
        const encodedPath = realArtworkFileName.split('/').map(encodeURIComponent).join('/');
        lowResArtworkUrl = 'https://archive.org/services/img/' + identifier;
        highResArtworkUrl = 'https://archive.org/download/' + identifier + '/' + encodedPath;
      }

      const audioFiles = files.filter(f =>
        f.format === 'VBR MP3' || f.format === 'MP3' || f.format === '128Kbps MP3'
        || f.format === 'Ogg Vorbis'
        || f.format === '64Kbps MP3'
      );

      const mp3Files = audioFiles.filter(f => f.format.includes('MP3'));
      const toUse = mp3Files.length > 0 ? mp3Files : audioFiles;

      const items = toUse.map((f, i) => ({
        id: identifier + '/' + f.name,
        title: f.title || f.name.replace(/\.[^.]+$/, '').replace(/^.*\//, ''),
        subtitle: f.artist || albumArtist,
        duration: f.length ? Math.round(parseFloat(f.length) * 1000) : null,
        lowResArtworkUrl: lowResArtworkUrl,
        highResArtworkUrl: highResArtworkUrl,
        url: 'https://archive.org/download/' + identifier + '/' + encodeURIComponent(f.name),
        artists: (f.artist || albumArtist) ? [{ id: f.artist || albumArtist, name: f.artist || albumArtist }] : [],
        albums: [{ id: identifier, title: albumTitle, lowResArtworkUrl: lowResArtworkUrl, highResArtworkUrl: highResArtworkUrl }]
      }));

      postResult({ items: items });
    artistSongs: |
      const creator = params.id;
      // Resume state: which page of the album search we're on, which album within that
      // page we were mid-way through, and which file within that album's file list.
      // A single album can contain more tracks than fit in one result batch, so both
      // docIndex and fileIndex are needed to resume without skipping or repeating tracks.
      const searchPage = params.previousResult?.searchPage || 1;
      const startDocIndex = params.previousResult?.docIndex || 0;
      const startFileIndex = params.previousResult?.fileIndex || 0;

      const url = 'https://archive.org/advancedsearch.php?q=' + encodeURIComponent('mediatype:audio AND creator:"' + creator + '"')
        + '&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=date&fl[]=downloads'
        + '&sort[]=downloads+desc'
        + '&rows=20'
        + '&page=' + searchPage
        + '&output=json';

      const searchResp = await fetch(url);
      const searchData = await searchResp.json();
      const docs = searchData.response?.docs || [];

      // Archive.org auto-derives a waveform PNG + spectrogram + item-tile thumb for every
      // audio upload, real uploaded cover art is an original-source image file.
      // Without this check, items with no real art would show the waveform as artwork.
      function findRealArtworkFile(fileList) {
        const candidates = (fileList || []).filter(f => {
          const name = (f.name || '').toLowerCase();
          if (!/\.(jpe?g|png|gif)$/.test(name)) return false;
          if (name === '__ia_thumb.jpg') return false;
          return f.source === 'original';
        });
        if (candidates.length === 0) return null;
        candidates.sort((a, b) => (parseInt(b.size, 10) || 0) - (parseInt(a.size, 10) || 0));
        return candidates[0].name;
      }

      const allItems = [];
      let nextDocIndex = null;
      let nextFileIndex = null;

      for (let i = startDocIndex; i < docs.length; i++) {
        const d = docs[i];
        const filesResp = await fetch('https://archive.org/metadata/' + encodeURIComponent(d.identifier) + '/files');
        const filesData = await filesResp.json();
        const files = filesData.result || [];

        const mp3s = files.filter(f => f.format === 'VBR MP3' || f.format === 'MP3' || f.format === '128Kbps MP3');
        const audioFiles = mp3s.length > 0 ? mp3s : files.filter(f => f.format === 'Ogg Vorbis');

        let lowResArtworkUrl;
        let highResArtworkUrl;
        const realArtworkFileName = findRealArtworkFile(files);
        if (realArtworkFileName) {
          const encodedPath = realArtworkFileName.split('/').map(encodeURIComponent).join('/');
          lowResArtworkUrl = 'https://archive.org/services/img/' + d.identifier;
          highResArtworkUrl = 'https://archive.org/download/' + d.identifier + '/' + encodedPath;
        }

        const fromFile = (i === startDocIndex) ? startFileIndex : 0;
        for (let j = fromFile; j < audioFiles.length; j++) {
          const f = audioFiles[j];
          allItems.push({
            id: d.identifier + '/' + f.name,
            title: f.title || f.name.replace(/\.[^.]+$/, '').replace(/^.*\//, ''),
            subtitle: d.creator || 'Unknown Artist',
            duration: f.length ? Math.round(parseFloat(f.length) * 1000) : null,
            lowResArtworkUrl: lowResArtworkUrl,
            highResArtworkUrl: highResArtworkUrl,
            url: 'https://archive.org/download/' + d.identifier + '/' + encodeURIComponent(f.name),
            albums: [{ id: d.identifier, title: d.title || d.identifier, lowResArtworkUrl: lowResArtworkUrl, highResArtworkUrl: highResArtworkUrl }]
          });
          if (allItems.length >= 30) {
            nextDocIndex = j + 1 < audioFiles.length ? i : i + 1;
            nextFileIndex = j + 1 < audioFiles.length ? j + 1 : 0;
            break;
          }
        }
        if (nextDocIndex !== null) break;
      }

      const result = { items: allItems };
      if (nextDocIndex !== null) {
        // Stopped mid-page (mid-album or between albums): resume here on the same search page.
        result.searchPage = searchPage;
        result.docIndex = nextDocIndex;
        result.fileIndex = nextFileIndex;
      } else if (docs.length === 20) {
        // Consumed every album on this search page; a full page means more albums may exist.
        result.searchPage = searchPage + 1;
        result.docIndex = 0;
        result.fileIndex = 0;
      }
      postResult(result);
    artistAlbums: |
      const creator = params.id;
      const page = params.previousResult?.page ? params.previousResult.page + 1 : 1;

      const url = 'https://archive.org/advancedsearch.php?q=' + encodeURIComponent('mediatype:audio AND creator:"' + creator + '"')
        + '&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=date&fl[]=downloads&fl[]=format'
        + '&sort[]=downloads+desc'
        + '&rows=30'
        + '&page=' + page
        + '&output=json';

      const resp = await fetch(url);
      const data = await resp.json();
      const docs = data.response?.docs || [];

      // Archive.org auto-derives a waveform PNG + spectrogram + item-tile thumb for every
      // audio upload, real uploaded cover art is tagged 'JPEG' or 'Item Image' in this list.
      // Without this check, items with no real art would show the waveform as artwork.
      function hasRealArtwork(format) {
        const formats = Array.isArray(format) ? format : (format ? [format] : []);
        return formats.includes('JPEG') || formats.includes('Item Image');
      }

      const items = docs.map(d => {
        return {
          id: d.identifier,
          title: d.title || d.identifier,
          subtitle: d.creator || 'Unknown Artist',
          year: d.date ? parseInt(d.date.substring(0, 4), 10) || null : null,
          lowResArtworkUrl: hasRealArtwork(d.format) ? 'https://archive.org/services/img/' + d.identifier : undefined
        };
      });

      const result = { items: items };
      if (docs.length === 30) {
        result.page = page;
      }
      postResult(result);
  get:
    artist: |
      const creator = params.id;

      const url = 'https://archive.org/advancedsearch.php?q=' + encodeURIComponent('mediatype:audio AND creator:"' + creator + '"')
        + '&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=date&fl[]=downloads'
        + '&sort[]=downloads+desc'
        + '&rows=15'
        + '&page=1'
        + '&output=json';

      const resp = await fetch(url);
      const data = await resp.json();
      const docs = data.response?.docs || [];

      const albums = docs.map(d => ({
        id: d.identifier,
        title: d.title || d.identifier,
        subtitle: d.creator || 'Unknown Artist',
        year: d.date ? parseInt(d.date.substring(0, 4), 10) || null : null,
        lowResArtworkUrl: 'https://archive.org/services/img/' + d.identifier,
        highResArtworkUrl: 'https://archive.org/services/img/' + d.identifier
      }));

      postResult({ albums: albums, songs: [] });
    album: |
      const identifier = params.id;

      const resp = await fetch('https://archive.org/metadata/' + encodeURIComponent(identifier) + '/metadata');
      const data = await resp.json();
      const meta = data.result || {};

      const filesResp = await fetch('https://archive.org/metadata/' + encodeURIComponent(identifier) + '/files');
      const filesData = await filesResp.json();
      const files = filesData.result || [];
      const audioCount = files.filter(f =>
        f.format === 'VBR MP3' || f.format === 'MP3' || f.format === '128Kbps MP3' || f.format === 'Ogg Vorbis'
      ).length;

      function findRealArtworkFile(fileList) {
        const candidates = (fileList || []).filter(f => {
          const name = (f.name || '').toLowerCase();
          if (!/\.(jpe?g|png|gif)$/.test(name)) return false;
          if (name === '__ia_thumb.jpg') return false;
          return f.source === 'original';
        });
        if (candidates.length === 0) return null;
        candidates.sort((a, b) => (parseInt(b.size, 10) || 0) - (parseInt(a.size, 10) || 0));
        return candidates[0].name;
      }

      let lowResArtworkUrl;
      let highResArtworkUrl;
      const realArtworkFileName = findRealArtworkFile(files);
      if (realArtworkFileName) {
        const encodedPath = realArtworkFileName.split('/').map(encodeURIComponent).join('/');
        lowResArtworkUrl = 'https://archive.org/services/img/' + identifier;
        highResArtworkUrl = 'https://archive.org/download/' + identifier + '/' + encodedPath;
      }

      postResult({
        id: identifier,
        title: meta.title || identifier,
        subtitle: meta.creator || 'Unknown Artist',
        year: meta.date ? parseInt(String(meta.date).substring(0, 4), 10) || null : null,
        trackCount: audioCount || null,
        lowResArtworkUrl: lowResArtworkUrl,
        highResArtworkUrl: highResArtworkUrl
      });
playback:
  html: |-
    <!DOCTYPE html>
    <html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>* { margin: 0; padding: 0; } html, body, iframe { width: 100%; height: 100%; border: none; overflow: hidden; }</style>
    </head>
    <body>
        <iframe id="player-frame" src="https://archive.org" style="width:100%;height:100%;border:none;"></iframe>
    </body>
    </html>
  userScripts:
    - title: Media Session Bridge
      content: |
        (function() {
          if (!('mediaSession' in navigator)) return;

          var originalSetActionHandler = navigator.mediaSession.setActionHandler.bind(navigator.mediaSession);
          var protectedActions = new Set(['play', 'pause', 'previoustrack', 'nexttrack', 'seekbackward', 'seekforward', 'seekto']);

          navigator.mediaSession.setActionHandler = function(action, handler) {
            if (protectedActions.has(action)) return;
            originalSetActionHandler(action, handler);
          };

          originalSetActionHandler('play', function() { if (window.boppaPlay) window.boppaPlay(); });
          originalSetActionHandler('pause', function() { if (window.boppaPause) window.boppaPause(); });
          originalSetActionHandler('seekbackward', null);
          originalSetActionHandler('seekforward', null);
          originalSetActionHandler('seekto', function(details) {
            if (window.boppaSeek) window.boppaSeek((details && details.seekTime != null ? details.seekTime : 0) * 1000);
          });
          originalSetActionHandler('previoustrack', function() { postEvent({type: 'previoustrackCommand'}); });
          originalSetActionHandler('nexttrack', function() { postEvent({type: 'nexttrackCommand'}); });

          var playbackStateDescriptor = Object.getOwnPropertyDescriptor(navigator.mediaSession.__proto__, 'playbackState')
            || Object.getOwnPropertyDescriptor(navigator.mediaSession, 'playbackState');
          window.__boppaOriginalPlaybackStateSetter = playbackStateDescriptor && playbackStateDescriptor.set
            ? playbackStateDescriptor.set.bind(navigator.mediaSession) : null;
          window.__boppaPlaybackState = 'paused';
          if (window.__boppaOriginalPlaybackStateSetter) {
            window.__boppaOriginalPlaybackStateSetter.call(navigator.mediaSession, 'paused');
            Object.defineProperty(navigator.mediaSession, 'playbackState', {
              get: function() { return window.__boppaPlaybackState; },
              set: function(val) {},
              configurable: true
            });
          }

          window.__boppaOriginalSetPositionState = navigator.mediaSession.setPositionState.bind(navigator.mediaSession);
          window.__boppaDuration = 0;
          window.__boppaPlaybackRate = 1.0;
          window.__boppaPosition = 0;
          window.__boppaPositionTimestamp = Date.now();
          window.__boppaGetCurrentPosition = function() {
            var elapsed = (Date.now() - window.__boppaPositionTimestamp) / 1000.0;
            var pos = window.__boppaPosition + elapsed * window.__boppaPlaybackRate;
            return Math.max(0, Math.min(pos, window.__boppaDuration || pos));
          };
