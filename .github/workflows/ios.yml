name: iOS starter workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build and Test default scheme using any available iPhone simulator
    runs-on: macos-latest

    defaults:
      run:
        working-directory: iOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install xcbeautify
        run: brew install xcbeautify
      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default | cat >default
          echo Using default scheme: $default
      - name: Select Simulator
        run: |
          # Pick a concrete booted-capable simulator UDID instead of scraping `xctrace list devices`
          # text for a device name and letting xcodebuild resolve "OS:latest" for it - that name/OS
          # pairing can be invalid on a given runner image even though the name itself exists.
          device_udid=$(xcrun simctl list devices available -j | jq -r '
            .devices
            | to_entries[]
            | select(.key | test("com.apple.CoreSimulator.SimRuntime.iOS"))
            | .key as $runtime
            | .value[]
            | select(.name | test("^iPhone"))
            | [$runtime, .udid] | @tsv
          ' | sort -r | head -1 | cut -f2)
          if [ -z "$device_udid" ]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "DEVICE_UDID=$device_udid" >> "$GITHUB_ENV"
          echo "Selected simulator: $device_udid"
      - name: Build
        env:
          scheme: ${{ 'default' }}
        run: |
          if [ $scheme = default ]; then scheme=$(cat default); fi
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace\$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj\$`"; fi
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          set -o pipefail && xcodebuild build-for-testing -scheme "$scheme" -"$filetype_parameter" "$file_to_build" -destination "id=$DEVICE_UDID" -skipMacroValidation | xcbeautify --renderer github-actions
      - name: Test
        env:
          scheme: ${{ 'default' }}
        run: |
          if [ $scheme = default ]; then scheme=$(cat default); fi
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace\$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj\$`"; fi
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          set -o pipefail && xcodebuild test-without-building -scheme "$scheme" -"$filetype_parameter" "$file_to_build" -destination "id=$DEVICE_UDID" -skipMacroValidation | xcbeautify --renderer github-actions --report junit --report-path build/reports
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'iOS/build/reports/junit.xml'
          check_name: 'Unit Test Results'
          detailed_summary: true
          group_suite: true
